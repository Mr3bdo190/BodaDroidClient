name: Build Boda Droid Client APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 سحب الكود من المستودع
      uses: actions/checkout@v3

    - name: ☕ إعداد بيئة Java
      uses: actions/setup-java@v3
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: 🔐 فك تشفير مفتاح Firebase (google-services.json)
      env:
        FIREBASE_SECRET: ${{ secrets.FIREBASE_JSON }}
      run: |
        echo $FIREBASE_SECRET | base64 -d > app/google-services.json

    - name: 🛠️ إعطاء صلاحيات التشغيل لـ Gradle
      run: chmod +x gradlew

    - name: 🚀 بناء تطبيق الأندرويد (Release APK)
      run: ./gradlew assembleRelease

    - name: 📦 استخراج ملف الـ APK
      uses: actions/upload-artifact@v3
      with:
        name: BodaDroid-Client-APK
        path: app/build/outputs/apk/release/app-release-unsigned.apk

