name: Build Boda Droid Client APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 سحب الكود من المستودع
      uses: actions/checkout@v4

    - name: ☕ إعداد بيئة Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: 🔐 وضع مفتاح Firebase
      env:
        FIREBASE_SECRET: ${{ secrets.FIREBASE_JSON }}
      run: |
        echo $FIREBASE_SECRET | base64 -d > app/google-services.json

    - name: 🐘 استدعاء محرك Gradle الرسمي
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.0'

    - name: 🚀 بناء تطبيق الأندرويد مباشرة
      run: gradle assembleRelease

    - name: 📦 استخراج ملف الـ APK
      uses: actions/upload-artifact@v4
      with:
        name: BodaDroid-Client-APK
        path: app/build/outputs/apk/release/app-release-unsigned.apk
